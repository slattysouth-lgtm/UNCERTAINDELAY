name: Build VST & Create Windows Installer

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    # 1. Checkout du code avec récupération récursive complète des sous-modules (JUCE, VST3 SDK)
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    # 2. Configuration CMake (Génère la solution Visual Studio 64-bit)
    - name: Configure CMake
      # ❌ OLD (remove this)
run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release

# ✅ NEW (use this)
run: cmake -B build -A x64

      # 2. Configuration CMake (Génère la solution Visual Studio 64-bit)
    - name: Configure CMake
      # ❌ OLD (remove this)
run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release

# ✅ NEW (use this)
run: cmake -B build -A x64
    # 4. Installation explicite d'Inno Setup sur le runner
    - name: Install Inno Setup
      run: choco install innosetup -y

    # 5. Compilation de l'installeur .exe
    - name: Compile Inno Setup Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_script.iss

    # 6. Export de l'installeur .exe dans les Artifacts GitHub
    - name: Upload Installer Executable
      uses: actions/upload-artifact@v4
      with:
        name: VST-Windows-64bit-Installer
        path: dist/*.exe
