name: Build VST & Create Windows Installer

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    # 1. Recuperation du code et des sous-modules
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    # 2. Configuration CMake
    - name: Configure CMake
      run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release

    # 3. Compilation C++ / VST
    - name: Build VST Plugin
      run: cmake --build build --config Release --parallel

    # 4. Verification des fichiers compiles (Debug)
    - name: List built files
      if: always()
      run: |
        Get-ChildItem -Path build -Recurse -Filter *.vst3

    # 5. Compilation de l'installeur Inno Setup
    - name: Compile Inno Setup Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_script.iss

    # 6. Export de l'installeur
    - name: Upload Installer Executable
      uses: actions/upload-artifact@v4
      with:
        name: VST-Windows-64bit-Installer
        path: dist/*.exe
